name: Refresh Tournament Data

on:
  schedule:
    # Every day at 09:00 JST (00:00 UTC)
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  refresh-json:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: |
          set -eu
          uv sync

      - name: Run scraper pipeline
        run: |
          set -eu
          uv run python -m src.scraper

      - name: Commit updated tournaments JSON
        run: |
          set -eu

          JSON_PATH="src/frontend/data/tournaments.json"

          if [ ! -f "$JSON_PATH" ]; then
            echo "Expected JSON file not found: $JSON_PATH"
            exit 1
          fi

          if [ -z "$(git status --porcelain "$JSON_PATH")" ]; then
            echo "No data changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "$JSON_PATH"
          git commit -m "chore(data): refresh shogi tournament data"
          git push
