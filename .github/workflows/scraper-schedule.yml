name: Trigger Scraper Schedule

on:
  schedule:
    # Every day at 09:00 JST (00:00 UTC)
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  trigger-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Validate required secrets
        env:
          RENDER_APP_URL: ${{ secrets.RENDER_APP_URL }}
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        run: |
          set -eu
          if [ -z "${RENDER_APP_URL}" ]; then
            echo "RENDER_APP_URL secret is required"
            exit 1
          fi
          if [ -z "${ADMIN_TOKEN}" ]; then
            echo "ADMIN_TOKEN secret is required"
            exit 1
          fi

      - name: Trigger scraper endpoint
        env:
          RENDER_APP_URL: ${{ secrets.RENDER_APP_URL }}
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        run: |
          set -eu

          endpoint="${RENDER_APP_URL%/}/admin/trigger-scraper"
          url="${endpoint}?token=${ADMIN_TOKEN}"

          echo "Triggering scraper: ${endpoint}"

          response_file="$(mktemp)"
          http_status="$(curl -sS -o "${response_file}" -w "%{http_code}" -X POST "${url}")"

          echo "HTTP status: ${http_status}"
          echo "Response body:"
          cat "${response_file}"

          case "${http_status}" in
            2*)
              echo "Scraper trigger succeeded."
              ;;
            *)
              echo "Scraper trigger failed with status ${http_status}."
              exit 1
              ;;
          esac
